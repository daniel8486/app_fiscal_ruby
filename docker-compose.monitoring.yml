services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 5
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'  
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    ports:
      - "9090:9090"
    networks:
      - monitoring
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    ports:
      - "3001:3000"
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: danieldjam
      GF_SECURITY_ADMIN_PASSWORD: "@AthusOtto@0401@@"
      GF_USERS_ALLOW_SIGN_UP: "false"
      TZ: America/Sao_Paulo
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      - prometheus  
    networks:
      - monitoring
  redis:
    image: redis:7
    container_name: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5  
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]  
    networks:
      - monitoring
  sidekiq:
    image: ruby:3.3.8
    container_name: sidekiq
    working_dir: /app
    volumes:
      - .:/app
    command: bash -c "bundle install && bundle exec sidekiq -r ./workers/document_processor_worker.rb -r ./workers/nfe_service_worker.rb -r ./workers/cte_service_worker.rb -r ./workers/mdfe_service_worker.rb -r ./workers/sat_service_worker.rb -r ./workers/nfce_service_worker.rb -r ./workers/nfse_service_worker.rb -r ./workers/document_simulation_worker.rb"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - monitoring
  postgres:
    image: postgres:latest
    container_name: postgres
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - monitoring

volumes:
  prometheus_data:
  grafana_data:
  redis_data:
  postgres_data:

networks:
  monitoring:
    driver: bridge