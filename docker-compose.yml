version: '3.8'

services:
  # Banco de dados PostgreSQL
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: fiscal_system
      POSTGRES_USER: fiscal_user
      POSTGRES_PASSWORD: fiscal_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fiscal_user -d fiscal_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis para cache e filas
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Aplicação principal (Orquestrador)
  app:
    build: .
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://fiscal_user:fiscal_password@postgres:5432/fiscal_system
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./certificates:/app/certificates
      - ./tmp/logs:/app/tmp/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Workers Sidekiq
  sidekiq:
    build: .
    command: bundle exec sidekiq -r ./config.rb -C config/sidekiq.rb
    environment:
      DATABASE_URL: postgresql://fiscal_user:fiscal_password@postgres:5432/fiscal_system
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./certificates:/app/certificates
      - ./tmp/logs:/app/tmp/logs
    restart: unless-stopped

  # Serviço NFe
  nfe-service:
    build: .
    command: bundle exec ruby services/microservices/nfe_service_app.rb
    ports:
      - "4001:4001"
    environment:
      NFE_SERVICE_PORT: 4001
      ENVIRONMENT: production
    restart: unless-stopped

  # Serviço NFCe
  nfce-service:
    build: .
    command: bundle exec ruby services/microservices/nfce_service_app.rb
    ports:
      - "4002:4002"
    environment:
      NFCE_SERVICE_PORT: 4002
      ENVIRONMENT: production
    restart: unless-stopped

  # Serviço NFSe
  nfse-service:
    build: .
    command: bundle exec ruby services/microservices/nfse_service_app.rb
    ports:
      - "4003:4003"
    environment:
      NFSE_SERVICE_PORT: 4003
      ENVIRONMENT: production
    restart: unless-stopped

  # Serviço CTe
  cte-service:
    build: .
    command: bundle exec ruby services/microservices/cte_service_app.rb
    ports:
      - "4004:4004"
    environment:
      CTE_SERVICE_PORT: 4004
      ENVIRONMENT: production
    restart: unless-stopped

  # Serviço MDFe
  mdfe-service:
    build: .
    command: bundle exec ruby services/microservices/mdfe_service_app.rb
    ports:
      - "4005:4005"
    environment:
      MDFE_SERVICE_PORT: 4005
      ENVIRONMENT: production
    restart: unless-stopped

  # Serviço SAT
  sat-service:
    build: .
    command: bundle exec ruby services/microservices/sat_service_app.rb
    ports:
      - "4006:4006"
    environment:
      SAT_SERVICE_PORT: 4006
      ENVIRONMENT: production
    restart: unless-stopped

  # Nginx como proxy reverso (opcional)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
