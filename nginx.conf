events {
    worker_connections 1024;
}

http {
    upstream fiscal_app {
        server app:4000;
    }

    upstream nfe_service {
        server nfe-service:4001;
    }

    upstream nfce_service {
        server nfce-service:4002;
    }

    upstream nfse_service {
        server nfse-service:4003;
    }

    upstream cte_service {
        server cte-service:4004;
    }

    upstream mdfe_service {
        server mdfe-service:4005;
    }

    upstream sat_service {
        server sat-service:4006;
    }

    # Configuração para o orquestrador principal
    server {
        listen 80;
        server_name localhost;

        # Proxy para aplicação principal
        location / {
            proxy_pass http://fiscal_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Endpoints diretos dos microserviços (para debug/monitoring)
        location /services/nfe/ {
            proxy_pass http://nfe_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /services/nfce/ {
            proxy_pass http://nfce_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /services/nfse/ {
            proxy_pass http://nfse_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /services/cte/ {
            proxy_pass http://cte_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /services/mdfe/ {
            proxy_pass http://mdfe_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /services/sat/ {
            proxy_pass http://sat_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health checks para load balancer
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # Configuração HTTPS (descomente e configure certificados)
    # server {
    #     listen 443 ssl http2;
    #     server_name localhost;
    #     
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     
    #     location / {
    #         proxy_pass http://fiscal_app;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto https;
    #     }
    # }
}
